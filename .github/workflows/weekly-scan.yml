name: Weekend Full Scan

on:
  schedule:
    - cron: "0 1 * * 6"   # 매주 토요일 01:00 UTC (한국시간 10:00)
  workflow_dispatch:        # 수동 실행도 가능

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full universe scan (전체 신호)
        run: python scripts/explore.py --universe --notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit scan results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/journals/
          git diff --cached --quiet || git commit -m "chore: weekend full scan $(date -u +%Y-%m-%d)"
          git push
